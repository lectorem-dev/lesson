server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:${DB_URL:jdbc:postgresql://localhost:5432/lesson}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:lesson}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:lesson}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.sql

app:
  content:
    root: ${CONTENT_ROOT:../content}
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
    expiration: ${JWT_EXPIRATION:24h}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
